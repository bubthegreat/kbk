apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kbk-environments
  namespace: argocd
spec:
  # Use the List generator to define each environment.
  # revision controls which git ref each environment renders from —
  # point staging/dev at a feature branch to validate it before it
  # reaches prod, then set them back to HEAD after merging.
  generators:
    - list:
        elements:
          - environment: prod
            namespace: kbk-prod
            overlay: prod
            telnetPort: "8989"
            revision: HEAD
          - environment: staging
            namespace: kbk-staging
            overlay: kbk-staging
            telnetPort: "8988"
            revision: claude/prod-staging-db-issues-dnrzm6
          - environment: dev
            namespace: kbk-dev
            overlay: dev
            telnetPort: "8987"
            revision: claude/prod-staging-db-issues-dnrzm6
  
  template:
    metadata:
      name: 'kbk-{{environment}}'
      labels:
        app: kbk
        environment: '{{environment}}'
    spec:
      project: default
      
      source:
        repoURL: https://github.com/bubthegreat/kbk.git
        targetRevision: '{{revision}}'
        path: 'k8s/overlays/{{overlay}}'
      
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        managedNamespaceMetadata:
          annotations:
            argocd.argoproj.io/sync-options: PrunePropagationPolicy=foreground,PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      # Ignore differences in certain fields that are expected to change
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: ""
          kind: PersistentVolumeClaim
          jsonPointers:
            - /spec/volumeName
            - /status
            - /metadata/annotations
            - /metadata/finalizers

