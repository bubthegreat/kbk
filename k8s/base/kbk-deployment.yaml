apiVersion: apps/v1
kind: Deployment
metadata:
  name: kbk-deployment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kbk
  template:
    metadata:
      labels:
        app: kbk
    spec:
      # Reduce termination grace period for faster shutdowns
      terminationGracePeriodSeconds: 5
      volumes:
        - name: kbk-player-storage
          persistentVolumeClaim:
            claimName: kbk-player-pvc
        - name: kbk-sys-storage
          persistentVolumeClaim:
            claimName: kbk-sys-pvc
        - name: kbk-data-storage
          persistentVolumeClaim:
            claimName: kbk-data-pvc
        - name: kbk-files
          emptyDir: {}
      initContainers:
        - name: init-kbk-data
          image: bubthegreat/kbk:839129b
          command: ['sh', '-c']
          args:
            - |
              # Copy player files if volume is empty
              if [ ! -f /kbk-persistent/player/Player.lst ]; then
                echo "Initializing player directory..."
                cp -r /kbk/player/* /kbk-persistent/player/ || true
              else
                echo "Player directory already initialized, skipping..."
              fi
              # Copy sys files if volume is empty
              if [ ! -f /kbk-persistent/sys/bugs.txt ]; then
                echo "Initializing sys directory..."
                cp -r /kbk/sys/* /kbk-persistent/sys/ || true
              else
                echo "Sys directory already initialized, skipping..."
              fi
              # Self-healing SQLite init: a corrupt or partial kbk.db left on the
              # retained volume would make the MUD exit(1) at boot and crash-loop
              # the pod, so verify integrity and quarantine bad files here.
              mkdir -p /kbk-persistent/data
              DB=/kbk-persistent/data/kbk.db
              if [ -f "$DB" ]; then
                if sqlite3 "$DB" 'PRAGMA integrity_check;' 2>/dev/null | grep -q '^ok$'; then
                  echo "SQLite integrity check passed"
                else
                  BACKUP="$DB.corrupt-$(date +%Y%m%d-%H%M%S)"
                  echo "SQLite integrity check FAILED - quarantining bad database at $BACKUP"
                  mv "$DB" "$BACKUP"
                fi
              fi
              # Schema is all IF NOT EXISTS, so re-applying is safe and picks up
              # newly added tables on existing volumes.
              echo "Applying SQLite schema..."
              sqlite3 "$DB" < /kbk/data/init_sqlite.sql
              echo "SQLite database ready"
              echo "Initialization complete!"
          volumeMounts:
            - name: kbk-player-storage
              mountPath: /kbk-persistent/player
            - name: kbk-sys-storage
              mountPath: /kbk-persistent/sys
            - name: kbk-data-storage
              mountPath: /kbk-persistent/data
      containers:
        - name: kbk
          image: bubthegreat/kbk:839129b
          imagePullPolicy: Always
          env:
            - name: ENABLE_GDB_DEBUGGING
              valueFrom:
                configMapKeyRef:
                  name: kbk-config
                  key: ENABLE_GDB_DEBUGGING
          ports:
            - containerPort: 8989
              name: telnet
          # Probe timings assume the server may be running under gdb
          # (ENABLE_GDB_DEBUGGING=true): everything responds slower, and after
          # a crash gdb spends time writing backtraces before the restart
          # loop's sleep. Liveness tolerates ~60s of no-answer so a pod is not
          # killed mid-backtrace, which would lose the crash data gdb exists
          # to capture.
          readinessProbe:
            tcpSocket:
              port: 8989
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8989
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          startupProbe:
            tcpSocket:
              port: 8989
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 90
          volumeMounts:
            - name: kbk-player-storage
              mountPath: /kbk/player
            - name: kbk-sys-storage
              mountPath: /kbk/sys
            - name: kbk-data-storage
              mountPath: /kbk/data
            - name: kbk-files
              mountPath: /kbk/localxfer

